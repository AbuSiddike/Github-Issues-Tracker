<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./assets/github-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <link rel="stylesheet" href="./tailwind_styles/output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      .geist {
        font-family: 'Geist', sans-serif;
      }
    </style>
  </head>
  <body class="geist bg-gray-100 flex items-center justify-center min-h-screen">
    <!-- Login Section -->
    <section class="flex items-center justify-center min-h-screen">
      <div class="hero">
        <div class="hero-content flex-col">
          <div class="card bg-base-100 shadow-2xl w-full p-6 md:p-10">
            <!-- Header -->
            <div class="text-center space-y-2 mb-4">
              <img
                src="./assets/github-logo.png"
                alt="github logo"
                class="mx-auto"
              />
              <h2 class="text-3xl font-bold">GitHub Issues Tracker</h2>
              <p>Sign in to manage your issues.</p>
            </div>

            <!-- Form -->
            <div class="card-body p-0">
              <fieldset class="fieldset space-y-2">
                <!-- Username -->
                <label class="label">Username</label>
                <input
                  id="usernameInput"
                  type="text"
                  placeholder="Enter Username"
                  class="input outline-none"
                />
                <p id="userHint" class="text-purple-500">Default: admin</p>

                <!-- Password -->
                <label class="label mt-2">Password</label>
                <input
                  id="passwordInput"
                  type="password"
                  placeholder="Password"
                  class="input outline-none"
                />
                <p id="passHint" class="text-purple-500">Default: admin123</p>

                <!-- Button -->
                <button id="loginBtn" class="btn btn-primary mt-4">
                  Sign In
                </button>

                <!-- Divider -->
                <div class="divider">OR</div>

                <!-- Demo credentials -->
                <div class="text-center">
                  <p class="mb-4 text-sm md:text-lg">Demo Credentials:</p>

                  <p class="text-sm md:text-lg">
                    <span class="font-bold">UserName:</span> admin
                  </p>

                  <p class="text-sm md:text-lg">
                    <span class="font-bold">Password:</span> admin123
                  </p>
                </div>
              </fieldset>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="./scripts/login.js"></script>
  </body>
</html>
