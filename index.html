<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./assets/github-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <link rel="stylesheet" href="./tailwind_styles/output.css" />
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="card w-96 bg-base-100 shadow-xl">
      <div class="card-body">
        <img src="./assets/github-logo.png" alt="Logo" class="w-30 mx-auto mb-2" />

        <h2 class="text-2xl font-bold text-center">GitHub Issues Tracker</h2>

        <p class="text-center text-gray-500">Sign in to manage your issues</p>

        <input
          id="username"
          type="text"
          placeholder="Username"
          class="input input-bordered w-full"
        />

        <input
          id="password"
          type="password"
          placeholder="Password"
          class="input input-bordered w-full"
        />

        <button onclick="login()" class="btn btn-primary w-full">
          Sign In
        </button>

        <p class="text-sm text-center mt-2">Demo Credentials</p>
      </div>
    </div>
  </body>
</html>
